name: Announce on X

on:
  release:
    types: [published]

jobs:
  tweet:
    runs-on: ubuntu-latest
    steps:
      - name: Post to X
        env:
          TWITTER_CONSUMER_KEY: ${{ secrets.TWITTER_CONSUMER_KEY }}
          TWITTER_CONSUMER_SECRET: ${{ secrets.TWITTER_CONSUMER_SECRET }}
          TWITTER_ACCESS_TOKEN: ${{ secrets.TWITTER_ACCESS_TOKEN }}
          TWITTER_ACCESS_TOKEN_SECRET: ${{ secrets.TWITTER_ACCESS_TOKEN_SECRET }}
        run: |
          pip install requests_oauthlib
          python3 << 'PYEOF'
          import os, json
          from requests_oauthlib import OAuth1Session

          tag = os.environ["GITHUB_REF_NAME"]
          url = f"https://github.com/F1bonacc1/process-compose/releases/tag/{tag}"
          text = f"New Release: Process Compose {tag}\nProcess Compose {tag} is out.\n\nWhat's new: {url}"

          twitter = OAuth1Session(
              os.environ["TWITTER_CONSUMER_KEY"],
              client_secret=os.environ["TWITTER_CONSUMER_SECRET"],
              resource_owner_key=os.environ["TWITTER_ACCESS_TOKEN"],
              resource_owner_secret=os.environ["TWITTER_ACCESS_TOKEN_SECRET"],
          )
          resp = twitter.post("https://api.twitter.com/2/tweets", json={"text": text})
          if resp.status_code != 201:
              print(f"Error: {resp.status_code} {resp.text}")
              raise SystemExit(1)
          print(f"Tweet posted: {json.loads(resp.text)['data']['id']}")
          PYEOF
